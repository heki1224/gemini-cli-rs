[workspace]
# Use Git tags as the version baseline (required when publish = false)
git_only = true
# Enable GitHub Releases
git_release_enable = true
# Enable Git tag creation
git_tag_enable = true
# Only trigger releases for feat/fix/perf/refactor; docs/chore/style/test do not bump the version
release_commits = "^(feat|fix|perf|refactor)[:(]"
